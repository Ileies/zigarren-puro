<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<title>%sveltekit.error.message%</title>
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css"
			rel="stylesheet"
			type="text/css"
		/>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body>
		<div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
			<main class="grid min-h-full place-items-center px-6 py-24 sm:py-32">
				<!-- Beispiel mit Status 404 -->
				<h1 class="text-center text-4xl font-bold text-error">%sveltekit.status%</h1>
				<div>
					<p class="mt-4 text-center text-lg text-base-content/80">%sveltekit.error.message%</p>
					<p class="mt-10 text-center">
						<a class="btn" href="/">Go back home</a>
					</p>
				</div>
			</main>
		</div>
	</body>
</html>
